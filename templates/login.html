<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(135deg,#4F8EF7,#A6C8FF);
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:420px;
}

.card{
    border:none;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.form-control{
    height:48px;
    border-radius:10px;
}

.btn-primary{
    height:48px;
    border-radius:10px;
    font-size:18px;
}

.logo{
    font-size:60px;
    text-align:center;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-weight:bold;
    color:#0d6efd;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="login-box">

<div class="card">

<div class="card-body">
<div class="logo">
😊
</div>

<h2 class="title">
Sentiment Analysis
</h2>

<p class="subtitle">
Welcome Back
</p>
<h2 class="text-center mb-4">
Sentiment Analysis Login
</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<hr>

<div class="text-center">

Don't have an account?

<a href="/register">

Register

</a>

</div>

</div>

</div>

</div>

</body>
</html>
