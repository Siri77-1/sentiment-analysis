<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4F8EF7,#A6C8FF);
            font-family:'Segoe UI',sans-serif;
        }

        .register-box{
            width:420px;
        }

        .card{
            border:none;
            border-radius:20px;
            padding:30px;
            box-shadow:0 12px 30px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:55px;
            text-align:center;
        }

        h2{
            text-align:center;
            color:#0d6efd;
            font-weight:bold;
            margin-top:10px;
        }

        p{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        .form-control{
            height:48px;
        }

        .input-group-text{
            background:white;
        }

        .btn-success{
            width:100%;
            height:48px;
            border-radius:10px;
            font-size:18px;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="register-box">

<div class="card">

<div class="logo">
🚀
</div>

<h2>Create Account</h2>

<p>Register to access the Sentiment Analysis Dashboard</p>

<form method="POST">

<div class="mb-3">

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person-fill"></i>
</span>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>

</div>

</div>

<div class="mb-4">

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

</div>

<button
type="submit"
class="btn btn-success">

Register

</button>

</form>

<hr>

<div class="text-center">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

</div>

</body>

</html>
